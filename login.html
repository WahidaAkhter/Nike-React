<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Nike React</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid #f0f0f0;
        }
        .login-card h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            margin-bottom: 10px;
            color: #0b0d17;
        }
        .login-card p {
            color: #6c757d;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }
        .btn-login {
            background: #0b0d17;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: var(--nike-orange);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(250, 128, 76, 0.2);
        }
        .social-login {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .social-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
            text-decoration: none;
            color: #333;
        }
        .social-btn:hover {
            background: #f8f9fa;
        }
        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #0b0d17;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-home:hover {
            color: var(--nike-orange);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i> Back to Store
    </a>

    <div class="login-container">
        <div class="login-card text-center">
            <img src="icons/Logo.png" alt="Nike Logo" width="120" class="mb-4">
            <h2>Welcome Back</h2>
            <p>Login to access your exclusive Nike gear.</p>
            
            <form>
                <input type="email" class="form-control" placeholder="Email Address" required>
                <input type="password" class="form-control" placeholder="Password" required>
                <button type="submit" class="btn-login">SIGN IN</button>
            </form>

            <div class="mt-4 text-muted">
                <span>Or continue with</span>
            </div>

            <div class="social-login">
                <a href="#" class="social-btn">
                    <i class="fab fa-google text-danger"></i> Google
                </a>
                <a href="#" class="social-btn">
                    <i class="fab fa-apple text-dark"></i> Apple
                </a>
            </div>

            <div class="mt-4">
                <p>Not a member? <a href="#" class="text-primary fw-bold text-decoration-none">Join Us</a></p>
            </div>
        </div>
    </div>

</body>
</html>
